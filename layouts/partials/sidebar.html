{{- $currentPage := . -}}
<div class="sidebar-panel">
  <section class="sidebar-brand-card">
    <a class="sidebar-brand" href="{{ .Site.Home.RelPermalink }}">
      <span class="sidebar-title">{{ .Site.Title }}</span>
    </a>
  </section>

  <section class="sidebar-nav-panel">
    <p class="sidebar-panel-kicker">Navigate</p>
    <nav class="sidebar-nav" aria-label="主导航">
      {{ range $index, $item := .Site.Menus.main }}
        {{ $isActive := or ($currentPage.IsMenuCurrent "main" $item) ($currentPage.HasMenuCurrent "main" $item) }}
        <a href="{{ $item.URL }}"{{ if $isActive }} class="is-active"{{ end }}>
          <span>{{ $item.Name }}</span>
          <span>{{ printf "%02d" (add $index 1) }}</span>
        </a>
      {{ end }}
    </nav>
    <div class="sidebar-controls">
      <button
        type="button"
        class="theme-toggle"
        data-theme-toggle
        data-mode="light"
        aria-label="切换日间和夜间模式"
        aria-pressed="false">
        <span class="theme-toggle-label">Day / Night</span>
        <span class="theme-toggle-state" data-theme-state>Day</span>
      </button>
    </div>
  </section>

  <section class="sidebar-profile-card" aria-label="个人信息">
    <div class="profile-avatar" aria-hidden="true">
      <span class="profile-avatar-mark"></span>
    </div>
    <div class="profile-copy">
      <p class="profile-name">koi</p>
      <a class="profile-link" href="https://linux.do/u/koi_alkaid/summary" target="_blank" rel="noreferrer">L站</a>
    </div>
  </section>

</div>
