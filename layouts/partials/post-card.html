<article class="writing-item reading-card{{ if eq .Section "notes" }} is-note{{ end }}">
  <div class="reading-card-top">
    <div class="writing-meta">
      <span>{{ .Date.Format "2006-01-02" }}</span>
    </div>
  </div>
  <h3 class="writing-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p class="writing-summary">{{ .Description | default (.Summary | plainify | truncate 140) }}</p>
  <div class="reading-card-footer">
    {{ with .Params.tags }}
      <ul class="tag-list">
        {{ range . }}
          <li><a class="tag-pill" href="{{ printf "tags/%s/" (. | urlize) | relLangURL }}">#{{ . }}</a></li>
        {{ end }}
      </ul>
    {{ else }}
      <div></div>
    {{ end }}
    <a class="reading-action" href="{{ .RelPermalink }}">{{ if eq .Section "notes" }}查看短记{{ else }}阅读全文{{ end }}</a>
  </div>
</article>
