{{ define "main" }}
  <section class="page-header">
    {{ if eq .Data.Singular "series" }}
      <p class="section-kicker">Browse Series</p>
      <h1>系列</h1>
    {{ else }}
      <p class="section-kicker">Browse Tags</p>
      <h1>{{ .Title }}</h1>
    {{ end }}
  </section>

  <section class="taxonomy-section">
    {{ range .Data.Terms.Alphabetical }}
      <div class="taxonomy-card">
        <a class="tag-pill" href="{{ .Page.RelPermalink }}">
          #{{ .Page.Title }}
          <span>{{ .Count }}</span>
        </a>
      </div>
    {{ else }}
      <div class="empty-state">还没有标签。</div>
    {{ end }}
  </section>
{{ end }}
