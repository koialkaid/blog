media:
  - name: posts_media
    label: Post Media
    input: static/posts
    output: ..
    categories:
      - image
    rename: safe
  - name: notes_media
    label: Note Media
    input: static/notes
    output: ..
    categories:
      - image
    rename: safe
  - name: about_media
    label: About Media
    input: static/about
    output: ../about
    categories:
      - image
    rename: safe
  - name: todo_media
    label: Todo Media
    input: static/todo
    output: ../todo
    categories:
      - image
    rename: safe

content:
  - name: posts
    label: 文章
    type: collection
    path: content/posts
    filename:
      template: "{primary}.md"
      field: create
    format: toml-frontmatter
    subfolders: false
    exclude:
      - _index.md
    view:
      primary: title
      fields:
        - title
        - date
        - tags
        - series
        - series_order
      sort:
        - date
        - title
      search:
        - title
        - description
        - tags
        - series
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 发布时间
        type: date
        required: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssXXX"
      - name: description
        label: 摘要
        type: text
        required: true
      - name: tags
        label: 标签
        type: string
        list: true
      - name: series
        label: 系列
        description: 留空表示普通文章；如属于系列，填系列名称。
        type: string
        list:
          max: 1
      - name: series_order
        label: 系列顺序
        description: 仅系列文章需要填写。
        type: number
        options:
          min: 1
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: posts_media

  - name: notes
    label: 日记
    type: collection
    path: content/notes
    filename:
      template: "{primary}.md"
      field: create
    format: toml-frontmatter
    subfolders: false
    exclude:
      - _index.md
    view:
      primary: title
      fields:
        - title
        - date
        - tags
      sort:
        - date
        - title
      search:
        - title
        - description
        - tags
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 发布时间
        type: date
        required: true
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm:ssXXX"
      - name: description
        label: 摘要
        type: text
        required: true
      - name: tags
        label: 标签
        type: string
        list: true
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: notes_media

  - name: about
    label: About
    type: file
    path: content/about/index.md
    format: toml-frontmatter
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: description
        label: 摘要
        type: text
        required: true
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: about_media

  - name: todo
    label: 待办
    type: file
    path: content/todo/index.md
    format: toml-frontmatter
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: description
        label: 摘要
        type: text
        required: true
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: todo_media

settings:
  config: false
