<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koi's Blog 写作后台</title>
  <link rel="canonical" href="https://app.pagescms.org/koialkaid/blog/main">
  <style>
    :root {
      --bg: #f3f3f3;
      --paper: #ffffff;
      --ink: #050505;
      --muted: #646464;
      --line: #d8d8d8;
      --line-strong: #a8a8a8;
      --shadow: 6px 6px 0 rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 0, rgba(255, 255, 255, 0.95), transparent 28%),
        linear-gradient(180deg, #fafafa 0%, var(--bg) 100%);
      font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      line-height: 1.72;
    }

    a {
      color: inherit;
    }

    .admin-frame {
      width: min(calc(100% - 2.2rem), 780px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 2.2rem 0 2.8rem;
      display: grid;
      align-content: center;
      gap: 1rem;
    }

    .brand-card,
    .panel {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
    }

    .brand-card {
      padding: 1.1rem 1.25rem;
      color: #fff;
      border-color: rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 35%),
        linear-gradient(180deg, #1a1a1a 0%, #000 100%);
    }

    .brand-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand-card h1 {
      margin: 0.12rem 0 0;
      font-size: clamp(2rem, 6vw, 4.2rem);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: -0.06em;
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr;
    }

    .panel {
      padding: 1.15rem 1.25rem 1.25rem;
    }

    .kicker {
      margin: 0 0 0.8rem;
      color: var(--ink);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.28rem, 3vw, 2.1rem);
      font-weight: 600;
      line-height: 1.16;
      letter-spacing: -0.045em;
    }

    p {
      margin: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 1rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.7rem;
      padding: 0.62rem 0.95rem;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #fff;
      text-decoration: none;
    }

    .button.secondary {
      background: var(--paper);
      color: var(--ink);
    }

    .button:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.08);
    }

    @media (max-width: 760px) {
      .admin-frame {
        width: min(calc(100% - 1.1rem), 640px);
        padding-top: 1rem;
      }

      .brand-card,
      .panel {
        padding-left: 1.05rem;
        padding-right: 1.05rem;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="admin-frame">
    <section class="brand-card" aria-label="Koi's Blog">
      <p>Writing Console</p>
      <h1>Koi's Blog</h1>
    </section>

    <div class="shell">
      <section class="panel">
        <p class="kicker">CMS 后台</p>
        <h2>从这里进入写作后台</h2>
        <div class="actions">
          <a class="button" href="https://app.pagescms.org/koialkaid/blog/main">进入 Pages CMS</a>
          <a class="button secondary" href="/blog/">返回博客首页</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
