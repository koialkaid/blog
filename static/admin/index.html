<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koi's Blog CMS</title>
  <meta http-equiv="refresh" content="0; url=https://app.pagescms.org/koialkaid/blog/main">
  <link rel="canonical" href="https://app.pagescms.org/koialkaid/blog/main">
  <script>
    window.location.replace("https://app.pagescms.org/koialkaid/blog/main");
  </script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f3f3;
      color: #111;
      font: 16px/1.6 "Noto Serif SC", "Source Han Serif SC", Georgia, serif;
    }

    main {
      width: min(100% - 2rem, 34rem);
      padding: 1.5rem;
      border: 1px solid #d8d8d8;
      background: #fff;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.05);
    }

    p {
      margin: 0;
    }

    p + p {
      margin-top: 0.75rem;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <p>Redirecting to the writing backend...</p>
    <p>If you are not redirected, open <a href="https://app.pagescms.org/koialkaid/blog/main">Pages CMS</a>.</p>
  </main>
</body>
</html>
